bbc_radio_on_kitchen_display:
  alias: BBC Radio on Kitchen Display
  description: Play a BBC Radio station on the kitchen display. Pass station as a key e.g. radio1, radio2, radio6.
  fields:
    station:
      name: Station
      description: BBC station key
      required: true
      selector:
        select:
          options:
            - label: BBC Radio 1
              value: radio1
            - label: BBC Radio 1Xtra
              value: radio1xtra
            - label: BBC Radio 2
              value: radio2
            - label: BBC Radio 3
              value: radio3
            - label: BBC Radio 4
              value: radio4
            - label: BBC Radio 4 Extra
              value: radio4extra
            - label: BBC Radio 5 Live
              value: radio5
            - label: BBC Radio 5 Live Sports Extra
              value: radio5sx
            - label: BBC Radio 6 Music
              value: radio6
            - label: BBC Asian Network
              value: asian
            - label: BBC World Service
              value: worldservice
  sequence:
  - variables:
      stations:
        radio1:
          url: https://as-hls-ww-live.akamaized.net/pool_01505109/live/ww/bbc_radio_one/bbc_radio_one.isml/bbc_radio_one-audio%3d320000.norewind.m3u8
          title: BBC Radio 1
          logo: https://sounds.files.bbci.co.uk/v2/networks/bbc_radio_one/background_image
        radio1xtra:
          url: https://lstn.lv/bbcradio.m3u8?station=bbc_1xtra&bitrate=96000
          title: BBC Radio 1Xtra
          logo: https://sounds.files.bbci.co.uk/v2/networks/bbc_1xtra/background_image
        radio2:
          url: https://lstn.lv/bbcradio.m3u8?station=bbc_radio_two&bitrate=96000
          title: BBC Radio 2
          logo: https://sounds.files.bbci.co.uk/v2/networks/bbc_radio_two/background_image
        radio3:
          url: https://lstn.lv/bbcradio.m3u8?station=bbc_radio_three&bitrate=96000
          title: BBC Radio 3
          logo: https://sounds.files.bbci.co.uk/v2/networks/bbc_radio_three/background_image
        radio4:
          url: https://lstn.lv/bbcradio.m3u8?station=bbc_radio_fourfm&bitrate=96000
          title: BBC Radio 4
          logo: https://sounds.files.bbci.co.uk/v2/networks/bbc_radio_four_extra/background_image
        radio4extra:
          url: https://lstn.lv/bbcradio.m3u8?station=bbc_radio_four_extra&bitrate=96000
          title: BBC Radio 4 Extra
          logo: https://sounds.files.bbci.co.uk/v2/networks/bbc_radio_four_extra/background_image
        radio5:
          url: https://lstn.lv/bbcradio.m3u8?station=bbc_radio_five_live&bitrate=96000
          title: BBC Radio 5 Live
          logo: https://sounds.files.bbci.co.uk/v2/networks/bbc_radio_five_live/background_image
        radio5sx:
          # UK-only stream — may be geo-blocked in Ireland
          url: https://lstn.lv/bbcradio.m3u8?station=bbc_radio_five_live_sports_extra&bitrate=96000&uk=1
          title: BBC Radio 5 Live Sports Extra
          logo: https://sounds.files.bbci.co.uk/v2/networks/bbc_radio_five_live_sports_extra/background_image
        radio6:
          url: https://lstn.lv/bbcradio.m3u8?station=bbc_6music&bitrate=96000
          title: BBC Radio 6 Music
          logo: https://sounds.files.bbci.co.uk/v2/networks/bbc_6music/background_image
        asian:
          url: https://lstn.lv/bbcradio.m3u8?station=bbc_asian_network&bitrate=96000
          title: BBC Asian Network
          logo: https://sounds.files.bbci.co.uk/v2/networks/bbc_asian_network/background_image
        worldservice:
          url: https://lstn.lv/bbcradio.m3u8?station=bbc_world_service&bitrate=96000
          title: BBC World Service
          logo: https://sounds.files.bbci.co.uk/v2/networks/bbc_world_service/background_image
  - action: media_player.play_media
    target:
      entity_id: media_player.kitchen_display
    data:
      media_content_id: "{{ stations[station].url }}"
      media_content_type: application/x-mpegURL
    metadata:
      title: "{{ stations[station].title }}"
      thumbnail: "{{ stations[station].logo }}"
      media_class: music
      children_media_class:
      navigateIds:
      - {}

