bbc_radio_on_kitchen_display:
  alias: BBC Radio on Kitchen Display
  description: Play a BBC Radio station on the kitchen display. Pass station as a key e.g. radio1, radio2, radio6.
  fields:
    station:
      name: Station
      description: BBC station key
      required: true
      selector:
        select:
          options:
            - label: BBC Radio 1
              value: radio1
            - label: BBC Radio 1Xtra
              value: radio1xtra
            - label: BBC Radio 2
              value: radio2
            - label: BBC Radio 3
              value: radio3
            - label: BBC Radio 4
              value: radio4
            - label: BBC Radio 4 Extra
              value: radio4extra
            - label: BBC Radio 5 Live
              value: radio5
            - label: BBC Radio 5 Live Sports Extra
              value: radio5sx
            - label: BBC Radio 6 Music
              value: radio6
            - label: BBC Asian Network
              value: asian
            - label: BBC World Service
              value: worldservice
  sequence:
  - variables:
      stations:
        radio1:
          url: https://a.files.bbci.co.uk/ms6/live/3441A116-B12E-4D2F-ACA8-C1984642FA4B/audio/simulcast/dash/nonuk/pc_hd_abr_v2/aks/bbc_radio_one.mpd
          title: BBC Radio 1
        radio1xtra:
          url: https://a.files.bbci.co.uk/ms6/live/3441A116-B12E-4D2F-ACA8-C1984642FA4B/audio/simulcast/dash/nonuk/pc_hd_abr_v2/aks/bbc_1xtra.mpd
          title: BBC Radio 1Xtra
        radio2:
          url: ttps://a.files.bbci.co.uk/ms6/live/3441A116-B12E-4D2F-ACA8-C1984642FA4B/audio/simulcast/dash/nonuk/pc_hd_abr_v2/aks/bbc_radio_two.mpd
          title: BBC Radio 2
        radio3:
          url: https://a.files.bbci.co.uk/ms6/live/3441A116-B12E-4D2F-ACA8-C1984642FA4B/audio/simulcast/dash/nonuk/pc_hd_abr_v2/aks/bbc_radio_three.mpd
          title: BBC Radio 3
        radio4:
          url: https://a.files.bbci.co.uk/ms6/live/3441A116-B12E-4D2F-ACA8-C1984642FA4B/audio/simulcast/dash/nonuk/pc_hd_abr_v2/aks/bbc_radio_fourfm.mpd
          title: BBC Radio 4
        radio4extra:
          url: https://a.files.bbci.co.uk/ms6/live/3441A116-B12E-4D2F-ACA8-C1984642FA4B/audio/simulcast/dash/nonuk/pc_hd_abr_v2/aks/bbc_radio_four_extra.mpd
          title: BBC Radio 4 Extra
        radio5:
          url: ttps://a.files.bbci.co.uk/ms6/live/3441A116-B12E-4D2F-ACA8-C1984642FA4B/audio/simulcast/dash/nonuk/pc_hd_abr_v2/aks/bbc_radio_five_live.mpd
          title: BBC Radio 5 Live
        radio6:
          url: https://a.files.bbci.co.uk/ms6/live/3441A116-B12E-4D2F-ACA8-C1984642FA4B/audio/simulcast/dash/nonuk/pc_hd_abr_v2/aks/bbc_6music.mpd
          title: BBC Radio 6 Music
  - action: media_player.play_media
    target:
      entity_id: media_player.kitchen_display
    data:
      media_content_id: "{{ stations[station].url }}"
      media_content_type: audio/mpeg
    metadata:
      title: "{{ stations[station].title }}"
      media_class: music
      children_media_class:
      navigateIds:
      - {}

