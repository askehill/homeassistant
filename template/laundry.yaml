- binary_sensor:
  - unique_id: tumble_dryer_state
    name: Tumble Dryer
    icon: mdi:tumble-dryer
    delay_off:
      minutes: 15
    state: >
      {% set total_w = states('sensor.laundry_power') | float %}
      {% set washer = states('select.washing_machine') %}
      {% if washer in ('Stopped', 'Paused') %}
        {% set dryer_w = total_w %}
      {% else %}
        {# Washer heating cycle draws ~2000W; tumble/rinse/spin draws ~400W.
           Use 1500W as the crossover point between these two phases.
           Dryer heating adds ~500W on top; cool-down draws ~50-100W and is
           bridged by delay_off rather than detected directly. #}
        {% set washer_est = 2000 if total_w > 1500 else 400 %}
        {% set dryer_w = total_w - washer_est %}
      {% endif %}
      {{ 'on' if dryer_w > 400 else 'off' }}

  - unique_id: washing_machine_state
    name: Washing Machine
    icon: mdi:washing-machine
    state: >
      {{ 'on' if is_state('select.washing_machine', 'Running') else 'off' }}

  - unique_id: dishwasher_state
    name: Dishwasher
    icon: mdi:dishwasher
    delay_off:
      minutes: 60
    state: >
      {% set current_power = states('sensor.shellypmmini_543204b7d0c0_power') | float %}
      {# Heating element only: >1900W. The 14-600W band was removed because the hot water tap's
         keep-warm cycle (~18-200W) caused false positives. The 60-min delay_off bridges the
         pump-only phases (~18W) between heating cycles instead. #}
      {{ current_power > 1900 }}

  - unique_id: hotwater_tap_state
    name: Hotwater Tap
    icon: mdi:water-pump
    state: >
      {% set current_power = states('sensor.shellypmmini_543204b7d0c0_power') | float %}
      {{ 1100 < current_power < 1500 }}

  - unique_id: tumble_dryer_finished
    name: Tumble Dryer Complete
    delay_on:
      minutes: 3
    state: >
      {{ is_state('binary_sensor.tumble_dryer_state', 'off') }}

  - unique_id: washing_machine_finished
    name: Washing Machine Complete
    delay_on:
      minutes: 3
    state: >
      {{ not is_state('select.washing_machine', 'Running') }}
