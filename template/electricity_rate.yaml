- sensor:
    - unique_id: electricity_rate
      name: Electricity Rate
      unit_of_measurement: 'EUR/kWh'
      state: >
        {% set rate_night = state_attr('sensor.electricity_plan_config', 'rate_night') | float %}
        {% set rate_day   = state_attr('sensor.electricity_plan_config', 'rate_day')   | float %}
        {% set rate_peak  = state_attr('sensor.electricity_plan_config', 'rate_peak')  | float %}
        {% set carbon_tax = state_attr('sensor.electricity_plan_config', 'carbon_tax') | float %}
        {% set hour = now().strftime('%H') | int %}
        {# Night: 23:00–08:00 #}
        {% if hour >= 23 or hour < 8 %}
          {{ (rate_night + carbon_tax) | round(4) }}
        {# Peak: 17:00–19:00 daily #}
        {% elif hour >= 17 and hour < 19 %}
          {{ (rate_peak + carbon_tax) | round(4) }}
        {# Day: everything else #}
        {% else %}
          {{ (rate_day + carbon_tax) | round(4) }}
        {% endif %}

    - unique_id: electricity_daily_fixed_cost
      name: Electricity Daily Fixed Cost
      unit_of_measurement: 'EUR'
      icon: mdi:currency-eur
      state: >
        {% set standing = state_attr('sensor.electricity_plan_config', 'standing_charge_annual') | float %}
        {% set pso      = state_attr('sensor.electricity_plan_config', 'pso_annual') | float %}
        {{ ((standing + pso) / 365) | round(4) }}
